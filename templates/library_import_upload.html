<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#090b18">
  <title>Загрузка библиотеки · {{ project_name }}</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; color: #f6f7ff; background: radial-gradient(circle at 20% 0%, #24285f 0, transparent 38%), radial-gradient(circle at 100% 35%, #34205e 0, transparent 36%), #080a16; }
    main { width: min(680px, 100%); margin: 0 auto; padding: max(26px, env(safe-area-inset-top)) 18px max(32px, env(safe-area-inset-bottom)); }
    .card { padding: 24px; border: 1px solid rgba(255,255,255,.12); border-radius: 26px; background: linear-gradient(145deg, rgba(25,28,63,.96), rgba(11,13,31,.96)); box-shadow: 0 24px 70px rgba(0,0,0,.38); }
    .mark { display: grid; place-items: center; width: 58px; height: 58px; margin-bottom: 17px; border-radius: 18px; font-size: 30px; background: linear-gradient(145deg, #8b5cf6, #4f46e5); box-shadow: 0 12px 32px rgba(93,72,219,.38); }
    h1 { margin: 0; font-size: 27px; line-height: 1.15; }
    .lead { margin: 12px 0 22px; color: #c7c9dd; line-height: 1.55; }
    .picker { display: block; padding: 18px; border: 1px dashed rgba(180,173,255,.55); border-radius: 19px; background: rgba(90,77,180,.12); cursor: pointer; }
    .picker strong, .picker span { display: block; }
    .picker span { margin-top: 7px; color: #aeb1c9; font-size: 14px; overflow-wrap: anywhere; }
    input { position: absolute; opacity: 0; pointer-events: none; }
    button { width: 100%; margin-top: 16px; padding: 15px 18px; border: 0; border-radius: 17px; color: white; font-size: 16px; font-weight: 750; background: linear-gradient(135deg, #7c3aed, #4f46e5); box-shadow: 0 13px 32px rgba(78,70,220,.32); }
    button:disabled { opacity: .46; box-shadow: none; }
    .progress { display: none; margin-top: 20px; }
    .track { height: 13px; overflow: hidden; border-radius: 999px; background: rgba(255,255,255,.09); }
    .bar { width: 0; height: 100%; border-radius: inherit; background: linear-gradient(90deg, #8b5cf6, #22d3ee); transition: width .2s ease; }
    .progress-line { display: flex; justify-content: space-between; gap: 12px; margin-top: 9px; color: #c7c9dd; font-size: 14px; }
    .status { min-height: 22px; margin-top: 17px; line-height: 1.45; color: #d7d9eb; }
    .status.error { color: #ffb4bd; }
    .status.success { color: #9ff0c8; }
    .note { margin: 20px 0 0; padding-top: 18px; border-top: 1px solid rgba(255,255,255,.09); color: #9da1bc; font-size: 13px; line-height: 1.5; }
  </style>
</head>
<body>
<main>
  <section class="card">
    <div class="mark">📚</div>
    <h1>Загрузка большого ZIP</h1>
    <p class="lead">Выберите тот же архив библиотеки. Он загрузится напрямую в VoxLyra частями и автоматически попадёт в фоновую очередь.</p>

    <label class="picker" for="archive">
      <strong>Выбрать ZIP-архив</strong>
      <span id="fileName">Файл ещё не выбран</span>
    </label>
    <input id="archive" type="file" accept=".zip,application/zip">
    <button id="uploadButton" type="button" disabled>Загрузить и начать импорт</button>

    <div class="progress" id="progress">
      <div class="track"><div class="bar" id="bar"></div></div>
      <div class="progress-line"><span id="progressText">0%</span><span id="sizeText"></span></div>
    </div>
    <div class="status" id="status" role="status" aria-live="polite"></div>
    <p class="note">После постановки архива в очередь окно можно закрыть. Импорт продолжится на сервере, а прогресс появится в сообщении бота.</p>
  </section>
</main>
<script>
(() => {
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const token = {{ upload_token | tojson }};
  const input = document.getElementById('archive');
  const button = document.getElementById('uploadButton');
  const fileName = document.getElementById('fileName');
  const progress = document.getElementById('progress');
  const bar = document.getElementById('bar');
  const progressText = document.getElementById('progressText');
  const sizeText = document.getElementById('sizeText');
  const status = document.getElementById('status');

  const formatBytes = (value) => {
    const mb = Number(value || 0) / 1024 / 1024;
    return `${mb.toFixed(mb >= 10 ? 1 : 2)} МБ`;
  };
  const initData = () => String(tg?.initData || '');
  const endpoint = (path) => new URL(path, window.location.origin).toString();
  const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

  const resumeKey = (file) => [
    'voxLibraryImportUpload',
    String(file?.name || ''),
    String(file?.size || 0),
    String(file?.lastModified || 0),
  ].join(':');

  const friendlyGatewayMessage = (statusCode, text) => {
    const raw = String(text || '').trim();
    if ([502, 503, 504].includes(Number(statusCode)) || /bad gateway|service unavailable|gateway timeout/i.test(raw)) {
      return 'Сервер Bothost временно перезапускается или занят. Загрузка будет повторена автоматически.';
    }
    return raw;
  };

  const errorFromXhr = (xhr, fallback) => {
    let message = fallback || 'Не удалось выполнить загрузку.';
    try {
      const data = JSON.parse(xhr.responseText || '{}');
      message = String(data.detail || data.message || message);
    } catch (_) {
      const text = friendlyGatewayMessage(xhr.status, xhr.responseText);
      if (text && text.length < 500) message = text;
    }
    const error = new Error(message);
    error.status = Number(xhr.status || 0);
    error.retryable = !xhr.status || [408, 425, 429, 500, 502, 503, 504].includes(Number(xhr.status));
    return error;
  };

  const request = (path, body, { timeoutMs = 120000, json = false } = {}) => new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', endpoint(path), true);
    xhr.timeout = timeoutMs;
    xhr.setRequestHeader('Accept', 'application/json');
    if (json) xhr.setRequestHeader('Content-Type', 'application/json;charset=UTF-8');
    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) {
        try { resolve(JSON.parse(xhr.responseText || '{}')); }
        catch (_) { reject(new Error('Сервер вернул повреждённый ответ.')); }
        return;
      }
      reject(errorFromXhr(xhr));
    };
    xhr.onerror = () => reject(errorFromXhr(xhr, 'Сервер загрузки недоступен.'));
    xhr.ontimeout = () => {
      const error = new Error('Сервер слишком долго не отвечает.');
      error.status = 0;
      error.retryable = true;
      reject(error);
    };
    xhr.send(json ? JSON.stringify(body || {}) : body);
  });

  const requestWithRetry = async (
    path,
    bodyFactory,
    {
      attempts = 8,
      timeoutMs = 120000,
      json = false,
      retryLabel = 'Связь с сервером',
    } = {},
  ) => {
    let lastError;
    for (let attempt = 1; attempt <= attempts; attempt += 1) {
      try {
        return await request(path, bodyFactory(), { timeoutMs, json });
      } catch (error) {
        lastError = error;
        if (!error?.retryable || attempt >= attempts) throw error;
        status.className = 'status';
        status.textContent = `${retryLabel}: повтор ${attempt} из ${attempts - 1}…`;
        await wait(Math.min(12000, 900 * (2 ** Math.min(attempt - 1, 4))));
      }
    }
    throw lastError || new Error('Не удалось связаться с сервером.');
  };

  const setProgress = (uploaded, total) => {
    const percent = total > 0 ? Math.min(100, Math.round(uploaded * 100 / total)) : 0;
    bar.style.width = `${percent}%`;
    progressText.textContent = `${percent}%`;
    sizeText.textContent = total > 0 ? `${formatBytes(uploaded)} из ${formatBytes(total)}` : '';
  };

  const receivedBytes = (received, chunkSize, totalSize) => {
    let bytes = 0;
    for (const rawIndex of received) {
      const index = Number(rawIndex);
      if (!Number.isInteger(index) || index < 0) continue;
      const start = index * chunkSize;
      if (start >= totalSize) continue;
      bytes += Math.min(chunkSize, totalSize - start);
    }
    return Math.min(totalSize, bytes);
  };

  input.addEventListener('change', () => {
    const file = input.files?.[0];
    if (!file) {
      fileName.textContent = 'Файл ещё не выбран';
      button.disabled = true;
      return;
    }
    fileName.textContent = `${file.name} · ${formatBytes(file.size)}`;
    button.disabled = !file.name.toLowerCase().endsWith('.zip');
    button.textContent = 'Загрузить и начать импорт';
    status.className = 'status';
    status.textContent = button.disabled ? 'Нужен файл с расширением .zip' : '';
    setProgress(0, file.size);
  });

  button.addEventListener('click', async () => {
    const file = input.files?.[0];
    if (!file || button.disabled) return;
    const telegramInitData = initData();
    if (!telegramInitData) {
      status.className = 'status error';
      status.textContent = 'Откройте эту страницу кнопкой из сообщения бота в Telegram.';
      return;
    }
    if (navigator.onLine === false) {
      status.className = 'status error';
      status.textContent = 'Нет подключения к интернету.';
      return;
    }

    button.disabled = true;
    input.disabled = true;
    progress.style.display = 'block';
    status.className = 'status';

    const storageKey = resumeKey(file);
    let rememberedUploadId = '';
    try { rememberedUploadId = String(localStorage.getItem(storageKey) || ''); } catch (_) {}

    try {
      status.textContent = 'Подготавливаю защищённую загрузку…';
      const start = await requestWithRetry(
        '/api/library-import-upload/start',
        () => ({
          token,
          filename: file.name,
          size: file.size,
          init_data: telegramInitData,
          resume_upload_id: rememberedUploadId,
        }),
        {
          attempts: 10,
          timeoutMs: 45000,
          json: true,
          retryLabel: 'Bothost ещё не ответил',
        },
      );

      const uploadId = String(start.upload_id || '');
      if (!uploadId) throw new Error('Сервер не создал задание загрузки.');
      try { localStorage.setItem(storageKey, uploadId); } catch (_) {}

      const chunkSize = Math.max(256 * 1024, Number(start.chunk_size || 1024 * 1024));
      const totalChunks = Math.ceil(file.size / chunkSize);
      const received = new Set(
        Array.isArray(start.received)
          ? start.received.map(Number).filter((value) => Number.isInteger(value) && value >= 0)
          : [],
      );
      setProgress(receivedBytes(received, chunkSize, file.size), file.size);

      for (let index = 0; index < totalChunks; index += 1) {
        const startByte = index * chunkSize;
        const endByte = Math.min(file.size, startByte + chunkSize);
        if (received.has(index)) {
          setProgress(Math.max(receivedBytes(received, chunkSize, file.size), endByte), file.size);
          continue;
        }
        status.textContent = `Загружаю часть ${index + 1} из ${totalChunks}…`;
        await requestWithRetry(
          `/api/library-import-upload/${encodeURIComponent(uploadId)}/chunk`,
          () => {
            const form = new FormData();
            form.append('index', String(index));
            form.append('total_chunks', String(totalChunks));
            form.append('init_data', telegramInitData);
            form.append('token', token);
            form.append('chunk', file.slice(startByte, endByte), `${file.name}.part`);
            return form;
          },
          {
            attempts: 10,
            timeoutMs: 90000,
            retryLabel: `Часть ${index + 1}`,
          },
        );
        received.add(index);
        setProgress(endByte, file.size);
      }

      status.textContent = 'Проверяю архив и ставлю импорт в очередь…';
      const finish = await requestWithRetry(
        `/api/library-import-upload/${encodeURIComponent(uploadId)}/finish`,
        () => ({
          token,
          total_chunks: totalChunks,
          init_data: telegramInitData,
        }),
        {
          attempts: 10,
          timeoutMs: 300000,
          json: true,
          retryLabel: 'Постановка в очередь',
        },
      );

      try { localStorage.removeItem(storageKey); } catch (_) {}
      setProgress(file.size, file.size);
      status.className = 'status success';
      status.textContent = `Архив принят. Задание №${finish.job_id} поставлено в очередь. Ботом можно пользоваться.`;
      button.textContent = 'Архив принят';
      if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    } catch (error) {
      status.className = 'status error';
      const message = String(error?.message || 'Загрузка остановлена.');
      status.textContent = `${message} Нажмите «Продолжить загрузку» — уже принятые части повторно не отправятся.`;
      button.disabled = false;
      input.disabled = false;
      button.textContent = 'Продолжить загрузку';
      if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
    }
  });
})();
</script>
</body>
</html>
