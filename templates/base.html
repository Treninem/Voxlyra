<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark light">
  <meta name="theme-color" content="#090b18">
  <title>{% block title %}{{ project_name }}{% endblock %}</title>
  <link rel="icon" type="image/webp" href="/static/img/miniapp/voxlyra-v.webp">
  <link rel="preload" as="image" href="/static/img/miniapp/voxlyra-mark.webp" fetchpriority="high">
  <link rel="stylesheet" href="/static/css/style.css?v={{ asset_version }}">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="{% block body_class %}{% endblock %}">
  <svg class="icon-sprite" aria-hidden="true">
    <symbol id="icon-home" viewBox="0 0 24 24"><path d="M3 10.7 12 3l9 7.7v9.1a1.2 1.2 0 0 1-1.2 1.2h-5.1v-6.2H9.3V21H4.2A1.2 1.2 0 0 1 3 19.8z"/></symbol>
    <symbol id="icon-books" viewBox="0 0 24 24"><path d="M5 3.5h5.2A1.8 1.8 0 0 1 12 5.3V21a3.3 3.3 0 0 0-3.3-3.3H5zM19 3.5h-5.2A1.8 1.8 0 0 0 12 5.3V21a3.3 3.3 0 0 1 3.3-3.3H19z"/></symbol>
    <symbol id="icon-audio" viewBox="0 0 24 24"><path d="M9 18V6l11-2v12"/><circle cx="6" cy="18" r="3"/><circle cx="17" cy="16" r="3"/></symbol>
    <symbol id="icon-library" viewBox="0 0 24 24"><path d="M5 4.5h12.5A1.5 1.5 0 0 1 19 6v14H6.5A2.5 2.5 0 0 1 4 17.5v-11A2 2 0 0 1 6 4.5z"/><path d="M4 17.5A2.5 2.5 0 0 1 6.5 15H19M8 8h7"/></symbol>
    <symbol id="icon-settings" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2.8 2.8-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2h-4V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1L4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9A1.7 1.7 0 0 0 3 14H2.8v-4H3a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9L4.2 7 7 4.2l.1.1A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.6v-.2h4V3a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1L19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.2v4H21a1.7 1.7 0 0 0-1.6 1z"/></symbol>
  </svg>
  <nav class="route-nav" id="routeNav" aria-label="Возврат и главное меню" hidden>
    <button class="route-nav-back" id="routeBackButton" type="button" aria-label="Вернуться назад">← <span>Назад</span></button>
    <a class="route-nav-home" href="/" aria-label="Перейти в главное меню">⌂ <span>В меню</span></a>
  </nav>
  <main class="app-shell">
    {% block content %}{% endblock %}
  </main>
  {% block bottom_nav %}
  <nav class="bottom-nav" aria-label="Главная навигация">
    <a href="/" data-nav="home"><svg aria-hidden="true"><use href="#icon-home"></use></svg><span>Главная</span></a>
    <a href="/catalog#all-books" data-nav="books"><svg aria-hidden="true"><use href="#icon-books"></use></svg><span>Каталог</span></a>
    <a href="/audio" data-nav="audio"><svg aria-hidden="true"><use href="#icon-audio"></use></svg><span>Аудио</span></a>
    <a href="/library" data-nav="library"><svg aria-hidden="true"><use href="#icon-library"></use></svg><span>Моё</span></a>
    <a href="/settings" data-nav="settings"><svg aria-hidden="true"><use href="#icon-settings"></use></svg><span>Настройки</span></a>
  </nav>
  {% endblock %}
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/static/js/app.js?v={{ asset_version }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
